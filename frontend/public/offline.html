<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Muslim Việt</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 2rem;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0c7356 0%, #134e3e 100%);
      color: white;
      text-align: center;
    }
    .container {
      max-width: 400px;
    }
    .icon {
      font-size: 4rem;
      margin-bottom: 1rem;
    }
    h1 {
      margin-bottom: 1rem;
      font-size: 1.5rem;
    }
    p {
      line-height: 1.6;
      opacity: 0.9;
    }
    button {
      margin-top: 2rem;
      padding: 0.75rem 1.5rem;
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s;
    }
    button:hover {
      background: rgba(255,255,255,0.3);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>Bạn đang offline</h1>
    <p>Không thể kết nối internet. Một số tính năng có thể không khả dụng.</p>
    <p>Vui lòng kiểm tra kết nối mạng và thử lại.</p>
    <button onclick="window.location.reload()">
      Thử lại
    </button>
  </div>
</body>
</html>
