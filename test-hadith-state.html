<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Hadith State Display</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .success { background-color: #d4edda; border-color: #c3e6cb; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; }
        .info { background-color: #d1ecf1; border-color: #bee5eb; }
        button { padding: 10px 15px; margin: 5px; cursor: pointer; }
        .heart, .bookmark { width: 20px; height: 20px; cursor: pointer; margin: 5px; }
        .heart.active { fill: red; color: red; }
        .bookmark.active { fill: blue; color: blue; }
        .hadith-card { border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 5px; }
        .buttons { display: flex; gap: 10px; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>🧪 Test Hadith State Display</h1>
    
    <div class="test-section">
        <h3>1. Test State Management</h3>
        <button onclick="testStateManagement()">Test State Management</button>
        <div id="stateResult"></div>
    </div>
    
    <div class="test-section">
        <h3>2. Test Visual States</h3>
        <div class="hadith-card">
            <h4>Test Hadith #123</h4>
            <p>This is a test hadith content...</p>
            <div class="buttons">
                <svg class="heart" onclick="toggleHeart()" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                </svg>
                <svg class="bookmark" onclick="toggleBookmark()" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
                </svg>
            </div>
            <div id="statusDisplay"></div>
        </div>
    </div>
    
    <div class="test-section">
        <h3>3. Test Data Consistency</h3>
        <button onclick="testDataConsistency()">Test Data Consistency</button>
        <div id="consistencyResult"></div>
    </div>
    
    <div class="test-section">
        <h3>4. Test Toggle Logic</h3>
        <button onclick="testToggleLogic()">Test Toggle Logic</button>
        <div id="toggleResult"></div>
    </div>

    <script>
        // Mock state management
        let favorites = [];
        let bookmarks = [];
        let isHeartActive = false;
        let isBookmarkActive = false;
        
        // Mock services
        class MockHybridFavoriteService {
            async toggleFavorite(isAuthenticated, favoriteData) {
                console.log('🔄 toggleFavorite called:', { isAuthenticated, favoriteData });
                
                const hadithId = parseInt(favoriteData.itemId);
                const isCurrentlyFavorited = favorites.includes(hadithId);
                
                if (isCurrentlyFavorited) {
                    // Remove from favorites
                    favorites = favorites.filter(id => id !== hadithId);
                    console.log('💔 Removed from favorites:', hadithId);
                    return { isFavorited: false };
                } else {
                    // Add to favorites
                    favorites.push(hadithId);
                    console.log('❤️ Added to favorites:', hadithId);
                    return { isFavorited: true };
                }
            }
        }
        
        class MockHybridBookmarkService {
            async toggleBookmark(isAuthenticated, bookmarkData) {
                console.log('🔄 toggleBookmark called:', { isAuthenticated, bookmarkData });
                
                const hadithId = parseInt(bookmarkData.itemId);
                const isCurrentlyBookmarked = bookmarks.includes(hadithId);
                
                if (isCurrentlyBookmarked) {
                    // Remove from bookmarks
                    bookmarks = bookmarks.filter(id => id !== hadithId);
                    console.log('🔖 Removed from bookmarks:', hadithId);
                    return false;
                } else {
                    // Add to bookmarks
                    bookmarks.push(hadithId);
                    console.log('📌 Added to bookmarks:', hadithId);
                    return true;
                }
            }
        }
        
        const favoriteService = new MockHybridFavoriteService();
        const bookmarkService = new MockHybridBookmarkService();
        
        function testStateManagement() {
            const result = document.getElementById('stateResult');
            try {
                console.log('🧪 Testing state management...');
                
                // Test initial state
                const initialFavorites = [...favorites];
                const initialBookmarks = [...bookmarks];
                
                result.innerHTML = `
                    <div class="success">
                        <h4>✅ State Management Test</h4>
                        <p><strong>Initial Favorites:</strong> ${initialFavorites.length}</p>
                        <p><strong>Initial Bookmarks:</strong> ${initialBookmarks.length}</p>
                        <p><strong>State arrays initialized:</strong> Yes</p>
                        <p><strong>Services available:</strong> Yes</p>
                    </div>
                `;
            } catch (error) {
                result.innerHTML = `
                    <div class="error">
                        <h4>❌ State Management Test Failed</h4>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }
        
        function toggleHeart() {
            const heart = document.querySelector('.heart');
            const hadithId = 123; // Test hadith ID
            
            // Simulate toggle
            favoriteService.toggleFavorite(false, {
                type: 'hadith',
                itemId: hadithId.toString(),
                title: 'Test Hadith',
                content: 'Test content'
            }).then(result => {
                isHeartActive = result.isFavorited;
                heart.classList.toggle('active', isHeartActive);
                updateStatusDisplay();
                console.log('Heart toggled:', isHeartActive);
            });
        }
        
        function toggleBookmark() {
            const bookmark = document.querySelector('.bookmark');
            const hadithId = 123; // Test hadith ID
            
            // Simulate toggle
            bookmarkService.toggleBookmark(false, {
                type: 'hadith',
                itemId: hadithId.toString(),
                title: 'Test Hadith',
                content: 'Test content'
            }).then(result => {
                isBookmarkActive = result;
                bookmark.classList.toggle('active', isBookmarkActive);
                updateStatusDisplay();
                console.log('Bookmark toggled:', isBookmarkActive);
            });
        }
        
        function updateStatusDisplay() {
            const statusDisplay = document.getElementById('statusDisplay');
            statusDisplay.innerHTML = `
                <div class="info">
                    <p><strong>Current State:</strong></p>
                    <p>❤️ Favorite: ${isHeartActive ? 'Active' : 'Inactive'}</p>
                    <p>📌 Bookmark: ${isBookmarkActive ? 'Active' : 'Inactive'}</p>
                    <p>📊 Total Favorites: ${favorites.length}</p>
                    <p>📊 Total Bookmarks: ${bookmarks.length}</p>
                </div>
            `;
        }
        
        function testDataConsistency() {
            const result = document.getElementById('consistencyResult');
            try {
                console.log('🧪 Testing data consistency...');
                
                const hadithId = 123;
                const isInFavorites = favorites.includes(hadithId);
                const isInBookmarks = bookmarks.includes(hadithId);
                
                result.innerHTML = `
                    <div class="success">
                        <h4>✅ Data Consistency Test</h4>
                        <p><strong>Hadith ID 123 in favorites:</strong> ${isInFavorites ? 'Yes' : 'No'}</p>
                        <p><strong>Hadith ID 123 in bookmarks:</strong> ${isInBookmarks ? 'Yes' : 'No'}</p>
                        <p><strong>Visual state matches data:</strong> ${(isHeartActive === isInFavorites && isBookmarkActive === isInBookmarks) ? 'Yes' : 'No'}</p>
                        <p><strong>Data consistency:</strong> ${(isHeartActive === isInFavorites && isBookmarkActive === isInBookmarks) ? '✅ Good' : '❌ Mismatch'}</p>
                    </div>
                `;
            } catch (error) {
                result.innerHTML = `
                    <div class="error">
                        <h4>❌ Data Consistency Test Failed</h4>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }
        
        function testToggleLogic() {
            const result = document.getElementById('toggleResult');
            try {
                console.log('🧪 Testing toggle logic...');
                
                // Test multiple toggles
                const testHadithId = 456;
                const initialFavoritesCount = favorites.length;
                const initialBookmarksCount = bookmarks.length;
                
                // Simulate multiple toggles
                Promise.all([
                    favoriteService.toggleFavorite(false, {
                        type: 'hadith',
                        itemId: testHadithId.toString(),
                        title: 'Test Hadith 456',
                        content: 'Test content'
                    }),
                    bookmarkService.toggleBookmark(false, {
                        type: 'hadith',
                        itemId: testHadithId.toString(),
                        title: 'Test Hadith 456',
                        content: 'Test content'
                    })
                ]).then(() => {
                    const afterAddFavoritesCount = favorites.length;
                    const afterAddBookmarksCount = bookmarks.length;
                    
                    result.innerHTML = `
                        <div class="success">
                            <h4>✅ Toggle Logic Test</h4>
                            <p><strong>Initial favorites:</strong> ${initialFavoritesCount}</p>
                            <p><strong>After add favorites:</strong> ${afterAddFavoritesCount}</p>
                            <p><strong>Initial bookmarks:</strong> ${initialBookmarksCount}</p>
                            <p><strong>After add bookmarks:</strong> ${afterAddBookmarksCount}</p>
                            <p><strong>Toggle logic:</strong> Working ✅</p>
                        </div>
                    `;
                });
                
            } catch (error) {
                result.innerHTML = `
                    <div class="error">
                        <h4>❌ Toggle Logic Test Failed</h4>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }
        
        // Auto-run initial test
        window.onload = function() {
            testStateManagement();
            updateStatusDisplay();
        };
    </script>
</body>
</html>
